---

name: Managed Inventory Sync

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      delay_minutes:
        description: 'Minutes to wait before launching tests'
        required: false
        default: '0'

jobs:
  # PHASE 1: PREPARATION
  prep:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tagger.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Bump version and push tag
        id: tagger
        uses: anothrNick/github-tag-action@1.67.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_PREFIX: v
          DEFAULT_BUMP: patch

      - name: Slack "Test Launch Waiting for Approval" Notification
        uses: slackapi/slack-github-action@v3.0.1
        id: notify
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            unfurl_links: false
            title: "⏳ Test Launch Approval Required: ${{ steps.tagger.outputs.new_tag }}"
            text: |
              rhis-build-inventory templates have been updated and new example.ca configuration created.
              *Version:* ${{ steps.tagger.outputs.new_tag }}
              *Action:* APPROVE/DENY - Deployment approval is required to run a rebuild test.
              *Approval Link:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}


  # PHASE 2: CONTROLLED TESTING (Expensive)
  expensive-test:
    needs: prep
    runs-on: ubuntu-latest
    environment: testing-gate
    steps:
      - name: Implement Time Delay
        if: github.event.inputs.delay_minutes > 0
        run: |
          echo "Waiting for ${{ github.event.inputs.delay_minutes }} minutes..."
          sleep $(( ${{ github.event.inputs.delay_minutes }} * 60 ))

      - name: Checkout Inventory
        uses: actions/checkout@v6
        with:
          path: inventory-repo

      - name: Run Expensive Test Suite
        id: tester
        run: |
          chmod +x inventory-repo/${{ vars.TEST_SCRIPT }}
          if ./inventory-repo/${{ vars.TEST_SCRIPT }}; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  # PHASE 3: SYNC & MERGE
  sync-and-merge:
    needs: [prep, expensive-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v6
        with:
          path: source-repo

      - name: Checkout Target Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.TARGET_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          path: target-repo

      - name: Sync Files
        run: |
          mkdir -p target-repo/deployments/
          cp -R source-repo/deployments/example.ca target-repo/deployments/

      - name: Create and Merge PR
        id: cpr
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          path: target-repo
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "Update to ${{ needs.prep.outputs.new_tag }}"
          branch: sync-${{ needs.prep.outputs.new_tag }}
          title: "Inventory Update: ${{ needs.prep.outputs.new_tag }}"
          base: main

      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v3.0.1
        id: notify
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            unfurl_links: false
            title: "Inventory Sync: ${{ needs.prep.outputs.new_tag }}"
            text: |
              *Event:* "${{ github.event_name }}" in "${{ github.repository }}" 🤓
              *Status:* ${{ job.status }}
              *Action Required:* APPROVE/DENY - Approval required for ${{ needs.prep.outputs.new_tag }}
              *PR:* ${{ steps.cpr.outputs.pull-request-url || 'N/A' }}

...
